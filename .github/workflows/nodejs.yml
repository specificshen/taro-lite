name: Node CI
env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nodejs-testing:
    name: Testing on Node.js ${{ matrix.node-version }} (${{ matrix.host }})
    strategy:
      matrix:
        node-version: [22.x]
        host: [ubuntu-latest]

    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Install dependencies
        run: pnpm -r install --frozen-lockfile
      - name: Export browser path
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(which chrome)" >> $GITHUB_ENV
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm run format:check
      - name: Typecheck
        run: pnpm run typecheck
      - name: Typecheck fixtures
        run: pnpm run typecheck:fixtures
      - name: build
        run: pnpm build
        env:
          NODE_OPTIONS: --max_old_space_size=4096
      - name: test
        run: pnpm test
      - name: Verify fixture build
        run: pnpm run verify:fixture:weapp
